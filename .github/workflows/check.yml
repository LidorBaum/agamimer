name: check
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: node check.mjs
        env:
          WATCH_URL:        ${{ secrets.WATCH_URL }}
          ROOM_CODE:        ${{ secrets.ROOM_CODE }}
          ALERT_LINK:       ${{ secrets.ALERT_LINK }}
          ALERT_LABEL:      ${{ secrets.ALERT_LABEL }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: commit state if changed
        run: |
          if ! git diff --quiet .state.json; then
            git config user.name  'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add .state.json
            git commit -m "wip"
            git push
          fi
